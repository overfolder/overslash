version: 2
updates:
  # Rust (Cargo) — Workspace
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "dev"
    open-pull-requests-limit: 10
    groups:
      cargo-deps:
        patterns: ["*"]

  # npm (Dashboard)
  - package-ecosystem: "npm"
    directory: "/dashboard"
    schedule:
      interval: "weekly"
    target-branch: "dev"
    open-pull-requests-limit: 10
    groups:
      dashboard-deps:
        patterns: ["*"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "dev"
    groups:
      github-actions-deps:
        patterns: ["*"]
