name: Sentry Comments Check

on:
  pull_request:
    branches: [master, dev]
  pull_request_review_comment:
    types: [created, edited, deleted]
  issue_comment:
    types: [created, edited, deleted]

permissions:
  pull-requests: read
  issues: read

jobs:
  check-sentry-comments:
    name: No unresolved Sentry issues
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'pull_request_review_comment' ||
      github.event.issue.pull_request
    runs-on: ubuntu-latest
    steps:
      - name: Check for unresolved Sentry comments
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber =
              context.payload.pull_request?.number ??
              context.payload.issue?.number;

            if (!prNumber) {
              core.info('No PR number found, skipping.');
              return;
            }

            const sentryBots = ['sentry-io[bot]', 'sentry-autofix[bot]', 'sentry[bot]'];

            // Use GraphQL to get review threads with resolution status
            const query = `query($owner: String!, $repo: String!, $pr: Int!) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $pr) {
                  reviewThreads(first: 100) {
                    nodes {
                      isResolved
                      comments(first: 1) {
                        nodes {
                          author { login }
                          url
                        }
                      }
                    }
                  }
                }
              }
            }`;

            const result = await github.graphql(query, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pr: prNumber,
            });

            const threads = result.repository.pullRequest.reviewThreads.nodes;
            const unresolvedReview = threads
              .filter((t) => {
                const author = t.comments.nodes[0]?.author?.login;
                return !t.isResolved && sentryBots.includes(author);
              })
              .map((t) => t.comments.nodes[0]?.url);

            // Fetch issue comments (these don't have thread resolution)
            const issueComments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                per_page: 100,
              }
            );

            const isSentry = (c) => sentryBots.includes(c.user?.login);
            const unresolvedIssue = issueComments.filter(
              (c) => isSentry(c) && !c.body?.includes('<!-- resolved -->')
            );

            const total = unresolvedReview.length + unresolvedIssue.length;

            if (total > 0) {
              const lines = [];
              for (const url of unresolvedReview) {
                lines.push(`- Review thread: ${url}`);
              }
              for (const c of unresolvedIssue) {
                lines.push(`- Issue comment: ${c.html_url}`);
              }
              core.setFailed(
                `Found ${total} unresolved Sentry comment(s):\n${lines.join('\n')}\n\n` +
                'Resolve all Sentry-reported issues before merging.'
              );
            } else {
              core.info('No unresolved Sentry comments found.');
            }
