name: Sentry Comments Check

on:
  check_run:
    types: [completed]
  pull_request_review_comment:
    types: [created, edited, deleted]
permissions:
  pull-requests: read
  checks: write

jobs:
  check-sentry-comments:
    name: No unresolved Sentry issues
    if: >-
      github.event_name == 'pull_request_review_comment' ||
      (github.event_name == 'check_run' &&
       github.event.check_run.name == 'Seer Code Review' &&
       github.event.check_run.pull_requests[0] != null)
    runs-on: ubuntu-latest
    steps:
      - name: Check for unresolved Sentry comments
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber =
              context.payload.pull_request?.number ??
              context.payload.issue?.number ??
              context.payload.check_run?.pull_requests?.[0]?.number;

            if (!prNumber) {
              core.info('No PR number found, skipping.');
              return;
            }

            // When triggered by check_run, the workflow runs against the
            // default branch, so its status posts to the master commit
            // rather than the PR head. Explicitly publish a check run on
            // the PR's head SHA so branch protection can gate on it.
            const headSha =
              context.payload.check_run?.head_sha ??
              context.payload.pull_request?.head?.sha ??
              null;
            const checkName = 'No unresolved Sentry issues';

            const sentryBots = ['sentry-io[bot]', 'sentry-autofix[bot]', 'sentry[bot]'];

            // Use GraphQL to get review threads with resolution status (paginated)
            const query = `query($owner: String!, $repo: String!, $pr: Int!, $cursor: String) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $pr) {
                  reviewThreads(first: 100, after: $cursor) {
                    pageInfo { hasNextPage endCursor }
                    nodes {
                      isResolved
                      comments(first: 1) {
                        nodes {
                          author { login }
                          url
                        }
                      }
                    }
                  }
                }
              }
            }`;

            let threads = [];
            let cursor = null;
            do {
              const result = await github.graphql(query, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pr: prNumber,
                cursor,
              });
              const page = result.repository.pullRequest.reviewThreads;
              threads = threads.concat(page.nodes);
              cursor = page.pageInfo.hasNextPage ? page.pageInfo.endCursor : null;
            } while (cursor);
            const unresolvedReview = threads
              .filter((t) => {
                const author = t.comments.nodes[0]?.author?.login;
                return !t.isResolved && sentryBots.includes(author);
              })
              .map((t) => t.comments.nodes[0]?.url);

            const failing = unresolvedReview.length > 0;
            const summary = failing
              ? `Found ${unresolvedReview.length} unresolved Sentry review thread(s).`
              : 'No unresolved Sentry comments found.';
            const text = failing
              ? unresolvedReview.map((url) => `- ${url}`).join('\n') +
                '\n\nResolve all Sentry-reported issues before merging.'
              : 'All Sentry review threads are resolved.';

            if (headSha) {
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: checkName,
                head_sha: headSha,
                status: 'completed',
                conclusion: failing ? 'failure' : 'success',
                output: { title: summary, summary, text },
              });
            } else {
              core.warning('No head SHA resolved; cannot publish PR check run.');
            }

            if (failing) {
              core.setFailed(summary);
            } else {
              core.info(summary);
            }
