name: Sentry Comments Check

on:
  pull_request:
    branches: [master, dev]
  pull_request_review_comment:
    types: [created, edited, deleted]
permissions:
  pull-requests: read

jobs:
  check-sentry-comments:
    name: No unresolved Sentry issues
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'pull_request_review_comment'
    runs-on: ubuntu-latest
    steps:
      - name: Check for unresolved Sentry comments
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber =
              context.payload.pull_request?.number ??
              context.payload.issue?.number;

            if (!prNumber) {
              core.info('No PR number found, skipping.');
              return;
            }

            const sentryBots = ['sentry-io[bot]', 'sentry-autofix[bot]', 'sentry[bot]'];

            // Use GraphQL to get review threads with resolution status
            const query = `query($owner: String!, $repo: String!, $pr: Int!) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $pr) {
                  reviewThreads(first: 100) {
                    nodes {
                      isResolved
                      comments(first: 1) {
                        nodes {
                          author { login }
                          url
                        }
                      }
                    }
                  }
                }
              }
            }`;

            const result = await github.graphql(query, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pr: prNumber,
            });

            const threads = result.repository.pullRequest.reviewThreads.nodes;
            const unresolvedReview = threads
              .filter((t) => {
                const author = t.comments.nodes[0]?.author?.login;
                return !t.isResolved && sentryBots.includes(author);
              })
              .map((t) => t.comments.nodes[0]?.url);

            if (unresolvedReview.length > 0) {
              const lines = unresolvedReview.map((url) => `- Review thread: ${url}`);
              core.setFailed(
                `Found ${unresolvedReview.length} unresolved Sentry review thread(s):\n${lines.join('\n')}\n\n` +
                'Resolve all Sentry-reported issues before merging.'
              );
            } else {
              core.info('No unresolved Sentry comments found.');
            }
