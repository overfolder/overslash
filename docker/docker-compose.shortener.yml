name: oversla-sh

# Local dev stack for the oversla.sh URL shortener. Runs independently of the
# main `overslash` compose project (different `name:`, different ports) so you
# can start it alongside `make dev` without collisions.

services:
  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "127.0.0.1:${VALKEY_HOST_PORT:-6380}:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  shortener:
    build:
      context: ..
      dockerfile: crates/oversla-sh/Dockerfile
    environment:
      VALKEY_URL: redis://valkey:6379
      API_KEY: ${SHORTENER_API_KEY:-devkey}
      BASE_URL: ${SHORTENER_BASE_URL:-http://localhost:8081}
      PORT: "8080"
      RUST_LOG: ${RUST_LOG:-info,oversla_sh=info}
    ports:
      - "127.0.0.1:${SHORTENER_HOST_PORT:-8081}:8080"
    depends_on:
      valkey:
        condition: service_healthy

volumes:
  valkey-data:
