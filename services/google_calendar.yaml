key: google_calendar
display_name: Google Calendar
hosts:
  - www.googleapis.com
auth:
  - type: oauth
    provider: google
    token_injection:
      as: header
      header_name: Authorization
      prefix: "Bearer "
  - type: api_key
    default_secret_name: google_calendar_token
    injection:
      as: header
      header_name: Authorization
      prefix: "Bearer "
actions:
  list_calendars:
    method: GET
    path: /calendar/v3/users/me/calendarList
    description: List all calendars for the authenticated user
    risk: read
    params:
      minAccessRole:
        type: string
        description: "Filter by minimum access role: freeBusyReader, reader, writer, owner"
        enum: [freeBusyReader, reader, writer, owner]
      showHidden:
        type: boolean
        description: Whether to show hidden calendars
  list_events:
    method: GET
    path: /calendar/v3/calendars/{calendarId}/events
    description: List events on a calendar
    risk: read
    scope_param: calendarId
    params:
      calendarId:
        type: string
        required: true
        description: "Calendar identifier (use 'primary' for the main calendar)"
        default: primary
      timeMin:
        type: string
        description: Lower bound (RFC3339 timestamp) for event start time
      timeMax:
        type: string
        description: Upper bound (RFC3339 timestamp) for event end time
      maxResults:
        type: integer
        description: Maximum number of events returned (default 250)
      q:
        type: string
        description: Free text search terms
      orderBy:
        type: string
        description: Order of results
        enum: [startTime, updated]
      singleEvents:
        type: boolean
        description: Whether to expand recurring events into instances
  get_event:
    method: GET
    path: /calendar/v3/calendars/{calendarId}/events/{eventId}
    description: Get a single calendar event
    risk: read
    scope_param: calendarId
    params:
      calendarId:
        type: string
        required: true
        description: Calendar identifier
      eventId:
        type: string
        required: true
        description: Event identifier
  create_event:
    method: POST
    path: /calendar/v3/calendars/{calendarId}/events
    description: Create a new calendar event
    risk: write
    scope_param: calendarId
    params:
      calendarId:
        type: string
        required: true
        description: "Calendar identifier (use 'primary' for the main calendar)"
        default: primary
      summary:
        type: string
        required: true
        description: Title of the event
      start:
        type: object
        required: true
        description: "Start time object: {dateTime, timeZone} or {date}"
      end:
        type: object
        required: true
        description: "End time object: {dateTime, timeZone} or {date}"
      description:
        type: string
        description: Description of the event
      location:
        type: string
        description: Geographic location of the event
      attendees:
        type: array
        description: "List of attendees: [{email}]"
  update_event:
    method: PUT
    path: /calendar/v3/calendars/{calendarId}/events/{eventId}
    description: Update an existing calendar event
    risk: write
    scope_param: calendarId
    params:
      calendarId:
        type: string
        required: true
        description: Calendar identifier
      eventId:
        type: string
        required: true
        description: Event identifier
      summary:
        type: string
        description: Title of the event
      start:
        type: object
        description: "Start time object: {dateTime, timeZone} or {date}"
      end:
        type: object
        description: "End time object: {dateTime, timeZone} or {date}"
      description:
        type: string
        description: Description of the event
      location:
        type: string
        description: Geographic location of the event
      attendees:
        type: array
        description: "List of attendees: [{email}]"
  delete_event:
    method: DELETE
    path: /calendar/v3/calendars/{calendarId}/events/{eventId}
    description: Delete a calendar event
    risk: delete
    scope_param: calendarId
    params:
      calendarId:
        type: string
        required: true
        description: Calendar identifier
      eventId:
        type: string
        required: true
        description: Event identifier
