openapi: 3.1.0
info:
  title: Google Calendar
  key: google_calendar
  category: Productivity
servers:
  - url: https://www.googleapis.com
components:
  securitySchemes:
    oauth:
      type: oauth2
      provider: google
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.google.com/o/oauth2/v2/auth
          tokenUrl: https://oauth2.googleapis.com/token
          scopes:
            https://www.googleapis.com/auth/calendar: ""
    token:
      type: apiKey
      in: header
      name: Authorization
      x-overslash-prefix: "Bearer "
      default_secret_name: google_calendar_token
paths:
  /calendar/v3/users/me/calendarList:
    get:
      operationId: list_calendars
      summary: List all calendars for the authenticated user
      risk: read
      parameters:
        - name: minAccessRole
          in: query
          description: "Filter by minimum access role: freeBusyReader, reader, writer, owner"
          schema:
            type: string
            enum: [freeBusyReader, reader, writer, owner]
        - name: showHidden
          in: query
          description: Whether to show hidden calendars
          schema:
            type: boolean
  /calendar/v3/calendars/{calendarId}/events:
    parameters:
      - name: calendarId
        in: path
        required: true
        description: "Calendar identifier (use 'primary' for the main calendar)"
        schema:
          type: string
          default: primary
        resolve:
          get: /calendar/v3/calendars/{calendarId}
          pick: summary
    get:
      operationId: list_events
      summary: "List events on calendar {calendarId}"
      risk: read
      scope_param: calendarId
      parameters:
        - name: timeMin
          in: query
          description: Lower bound (RFC3339 timestamp) for event start time
          schema:
            type: string
        - name: timeMax
          in: query
          description: Upper bound (RFC3339 timestamp) for event end time
          schema:
            type: string
        - name: maxResults
          in: query
          description: Maximum number of events returned (default 250)
          schema:
            type: integer
        - name: q
          in: query
          description: Free text search terms
          schema:
            type: string
        - name: orderBy
          in: query
          description: Order of results
          schema:
            type: string
            enum: [startTime, updated]
        - name: singleEvents
          in: query
          description: Whether to expand recurring events into instances
          schema:
            type: boolean
    post:
      operationId: create_event
      summary: "Create event '{summary}' on calendar {calendarId}"
      risk: write
      scope_param: calendarId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [summary, start, end]
              properties:
                summary:
                  type: string
                  description: Title of the event
                start:
                  type: object
                  description: "Start time object: {dateTime, timeZone} or {date}"
                end:
                  type: object
                  description: "End time object: {dateTime, timeZone} or {date}"
                description:
                  type: string
                  description: Description of the event
                location:
                  type: string
                  description: Geographic location of the event
                attendees:
                  type: array
                  description: "List of attendees: [{email}]"
  /calendar/v3/calendars/{calendarId}/events/{eventId}:
    parameters:
      - name: calendarId
        in: path
        required: true
        description: Calendar identifier
        schema:
          type: string
        resolve:
          get: /calendar/v3/calendars/{calendarId}
          pick: summary
      - name: eventId
        in: path
        required: true
        description: Event identifier
        schema:
          type: string
        resolve:
          get: /calendar/v3/calendars/{calendarId}/events/{eventId}
          pick: summary
    get:
      operationId: get_event
      summary: "Get event {eventId} on calendar {calendarId}"
      risk: read
      scope_param: calendarId
    patch:
      operationId: update_event
      summary: "Update event {eventId} on calendar {calendarId}"
      risk: write
      scope_param: calendarId
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                summary:
                  type: string
                  description: Title of the event
                start:
                  type: object
                  description: "Start time object: {dateTime, timeZone} or {date}"
                end:
                  type: object
                  description: "End time object: {dateTime, timeZone} or {date}"
                description:
                  type: string
                  description: Description of the event
                location:
                  type: string
                  description: Geographic location of the event
                attendees:
                  type: array
                  description: "List of attendees: [{email}]"
    delete:
      operationId: delete_event
      summary: "Delete event {eventId} on calendar {calendarId}"
      risk: delete
      scope_param: calendarId
