key: github
display_name: GitHub
hosts:
  - api.github.com
auth:
  - type: oauth
    provider: github
    token_injection:
      as: header
      header_name: Authorization
      prefix: "Bearer "
  - type: api_key
    default_secret_name: github_token
    injection:
      as: header
      header_name: Authorization
      prefix: "Bearer "
actions:
  get_authenticated_user:
    method: GET
    path: /user
    description: Get the authenticated user's profile
    risk: read
  list_repos:
    method: GET
    path: /user/repos
    description: "List repositories for the authenticated user[, sorted by {sort}]"
    risk: read
    params:
      sort:
        type: string
        description: Sort by created, updated, pushed, full_name
        enum: [created, updated, pushed, full_name]
      per_page:
        type: integer
        description: Results per page (max 100)
        default: 30
  get_repo:
    method: GET
    path: /repos/{repo}
    description: "Get repository {repo}"
    risk: read
    scope_param: repo
    params:
      repo:
        type: string
        required: true
        description: "owner/repo"
  list_issues:
    method: GET
    path: /repos/{repo}/issues
    description: "List issues on {repo}[ (state={state})]"
    risk: read
    scope_param: repo
    params:
      repo:
        type: string
        required: true
        description: "owner/repo"
      state:
        type: string
        description: Filter by state
        enum: [open, closed, all]
      per_page:
        type: integer
        description: Results per page (max 100)
        default: 30
  create_pull_request:
    method: POST
    path: /repos/{repo}/pulls
    description: "Create pull request '{title}' on {repo}"
    risk: write
    scope_param: repo
    params:
      repo:
        type: string
        required: true
        description: "owner/repo"
      title:
        type: string
        required: true
        description: PR title
      head:
        type: string
        required: true
        description: Branch to merge from
      base:
        type: string
        required: true
        description: Branch to merge into
      body:
        type: string
        description: PR description
  create_issue:
    method: POST
    path: /repos/{repo}/issues
    description: "Create issue '{title}' on {repo}"
    risk: write
    scope_param: repo
    params:
      repo:
        type: string
        required: true
        description: "owner/repo"
      title:
        type: string
        required: true
      body:
        type: string
