openapi: 3.1.0
info:
  title: GitHub
  key: github
  category: Development
servers:
  - url: https://api.github.com
components:
  securitySchemes:
    oauth:
      type: oauth2
      provider: github
      flows:
        authorizationCode:
          authorizationUrl: https://github.com/login/oauth/authorize
          tokenUrl: https://github.com/login/oauth/access_token
          scopes:
            repo: ""
            read:user: ""
            user:email: ""
    token:
      type: apiKey
      in: header
      name: Authorization
      x-overslash-prefix: "Bearer "
      default_secret_name: github_token
paths:
  /user:
    get:
      operationId: get_authenticated_user
      summary: Get the authenticated user's profile
      risk: read
  /user/repos:
    get:
      operationId: list_repos
      summary: "List repositories for the authenticated user[, sorted by {sort}]"
      risk: read
      parameters:
        - name: sort
          in: query
          description: Sort by created, updated, pushed, full_name
          schema:
            type: string
            enum: [created, updated, pushed, full_name]
        - name: per_page
          in: query
          description: Results per page (max 100)
          schema:
            type: integer
            default: 30
  /repos/{repo}:
    get:
      operationId: get_repo
      summary: "Get repository {repo}"
      risk: read
      scope_param: repo
      parameters:
        - name: repo
          in: path
          required: true
          description: "owner/repo"
          schema:
            type: string
  /repos/{repo}/issues:
    parameters:
      - name: repo
        in: path
        required: true
        description: "owner/repo"
        schema:
          type: string
    get:
      operationId: list_issues
      summary: "List issues on {repo}[ (state={state})]"
      risk: read
      scope_param: repo
      parameters:
        - name: state
          in: query
          description: Filter by state
          schema:
            type: string
            enum: [open, closed, all]
        - name: per_page
          in: query
          description: Results per page (max 100)
          schema:
            type: integer
            default: 30
    post:
      operationId: create_issue
      summary: "Create issue '{title}' on {repo}"
      risk: write
      scope_param: repo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                body:
                  type: string
  /repos/{repo}/pulls:
    post:
      operationId: create_pull_request
      summary: "Create pull request '{title}' on {repo}"
      risk: write
      scope_param: repo
      parameters:
        - name: repo
          in: path
          required: true
          description: "owner/repo"
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, head, base]
              properties:
                title:
                  type: string
                  description: PR title
                head:
                  type: string
                  description: Branch to merge from
                base:
                  type: string
                  description: Branch to merge into
                body:
                  type: string
                  description: PR description
