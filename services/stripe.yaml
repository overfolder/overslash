openapi: 3.1.0
info:
  title: Stripe
  key: stripe
servers:
  - url: https://api.stripe.com
components:
  securitySchemes:
    token:
      type: apiKey
      in: header
      name: Authorization
      x-overslash-prefix: "Bearer "
      default_secret_name: stripe_key
paths:
  /v1/charges:
    get:
      operationId: list_charges
      summary: List recent charges
      risk: read
      parameters:
        - name: limit
          in: query
          description: Number of charges to return (max 100)
          schema:
            type: integer
            default: 10
    post:
      operationId: create_charge
      summary: "Create charge for {amount} {currency}"
      risk: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, currency]
              properties:
                amount:
                  type: integer
                  description: Amount in cents
                currency:
                  type: string
                  description: Three-letter ISO currency code
                source:
                  type: string
                  description: Payment source token
  /v1/customers:
    get:
      operationId: list_customers
      summary: List customers
      risk: read
