openapi: 3.1.0
info:
  title: X (Twitter)
  key: x
  category: Social
servers:
  - url: https://api.twitter.com
  - url: https://api.x.com
components:
  securitySchemes:
    oauth:
      type: oauth2
      provider: x
      flows:
        authorizationCode:
          authorizationUrl: https://twitter.com/i/oauth2/authorize
          tokenUrl: https://api.twitter.com/2/oauth2/token
          scopes:
            tweet.read: ""
            tweet.write: ""
            users.read: ""
            offline.access: ""
paths:
  /2/users/me:
    get:
      operationId: get_me
      summary: Get the authenticated user's profile
      risk: read
  /2/tweets:
    post:
      operationId: post_tweet
      summary: Create a tweet
      risk: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text:
                  type: string
                  description: Tweet text content
  /2/tweets/{tweet_id}:
    delete:
      operationId: delete_tweet
      summary: "Delete tweet {tweet_id}"
      risk: write
      scope_param: tweet_id
      parameters:
        - name: tweet_id
          in: path
          required: true
          description: The ID of the tweet to delete
          schema:
            type: string
  /2/users/{user_id}/tweets:
    get:
      operationId: get_user_tweets
      summary: "Get tweets for user {user_id}"
      risk: read
      scope_param: user_id
      parameters:
        - name: user_id
          in: path
          required: true
          description: The user ID
          schema:
            type: string
        - name: max_results
          in: query
          description: Maximum number of results (10-100)
          schema:
            type: integer
            default: 10
