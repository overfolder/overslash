openapi: 3.1.0
info:
  title: WhatsApp
  key: whatsapp
  category: Communication
  description: >
    Send and read WhatsApp messages via a self-hosted whatsapp-mcp-docker
    container (https://github.com/angel-manuel/whatsapp-mcp-docker), which
    bundles `whatsmeow` and exposes its tools over Streamable HTTP MCP
    with mandatory bearer auth. Each container holds one WhatsApp session
    (one paired phone number); operators run one container per
    end-user/account.
x-overslash-runtime: mcp
servers: []
paths: {}
x-overslash-mcp:
  # url and secret_name are not set here — operators must provide both when
  # creating a service instance from this template:
  #   url        — the hosted whatsapp-mcp-docker endpoint (e.g. http://host:8081/mcp)
  #   secret_name — vault key that holds the container's AUTH_TOKEN bearer token
  auth:
    kind: bearer
  # Tools are authored inline because globals are not resync-able (see
  # `resync_mcp_tools` in routes/templates.rs — globals ship their tool
  # list in-repo). When an operator promotes this template to org/user
  # tier, `autodiscover: true` lets `POST /v1/templates/whatsapp/mcp/resync`
  # populate `discovered_tools` and merge on top of these entries.
  autodiscover: true
  tools:
    # ── pairing (mutate session state; exempt from `not_paired` gate) ──
    - name: pairing_start
      risk: write
      description: "Open a WhatsApp pair flow and return the first event (rotating QR payload, plus a phone-link code if {phone} is given)"
      input_schema:
        type: object
        properties:
          phone:
            type: string
            description: "Optional E.164 phone number (digits only, no `+`). When set, returns a phone-link code in addition to the QR."
          device_name:
            type: string
            description: "Label shown on the paired phone; defaults to `WHATSAPP_DEVICE_NAME` env or `whatsapp-mcp`."
        required: []

    - name: pairing_complete
      risk: write
      description: "Poll the in-progress pair flow; blocks up to {wait_seconds} for a terminal event"
      input_schema:
        type: object
        properties:
          wait_seconds:
            type: integer
            minimum: 0
            maximum: 120
            default: 60
            description: "Max seconds to wait. 0 = return the latest cached event without blocking."
        required: []

    # ── messaging ──
    - name: send_message
      risk: write
      scope_param: recipient
      description: 'Send WhatsApp message "{text}" to {recipient}[, quoting {reply_to_id}]'
      input_schema:
        type: object
        properties:
          recipient:
            type: string
            description: "Destination chat: a JID (`user@s.whatsapp.net` or `group@g.us`) or a raw phone number with country code (digits only)."
          text:
            type: string
            minLength: 1
            description: "Message body. Must be non-empty."
          reply_to_id:
            type: string
            description: "Optional stanza id of the message to quote-reply to."
        required: [recipient, text]
      # MCP-runtime disclosure projection is {runtime, tool, arguments,
      # service, action} (see compute_approval_detail in routes/actions.rs),
      # so filters address `.arguments.*` rather than the HTTP `.params.*` /
      # `.body.*` shape used by Mode A/C HTTP actions.
      disclose:
        - label: "Recipient"
          filter: ".arguments.recipient"
        - label: "Message"
          filter: ".arguments.text"
        - label: "Reply to"
          filter: ".arguments.reply_to_id // empty"

    # ── contacts ──
    - name: search_contacts
      risk: read
      description: "Search cached contacts by substring {query} across name, push name, business name, nickname, and phone"
      input_schema:
        type: object
        properties:
          query:
            type: string
            description: "Case-insensitive substring."
          limit:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          page:
            type: integer
            minimum: 0
            default: 0
        required: [query]

    - name: list_all_contacts
      risk: read
      description: "List all cached contacts, paginated, in display-name order"
      input_schema:
        type: object
        properties:
          limit:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
          page:
            type: integer
            minimum: 0
            default: 0
        required: []

    - name: get_contact_details
      risk: read
      scope_param: jid
      description: "Fetch full details for the contact at {jid} (cache + live USync: status, profile picture, is_on_whatsapp)"
      input_schema:
        type: object
        properties:
          jid:
            type: string
            minLength: 1
            description: "WhatsApp JID (e.g. `1234567890@s.whatsapp.net`)."
        required: [jid]

    - name: get_group_info
      risk: read
      scope_param: group_jid
      description: "Fetch authoritative group metadata for {group_jid} (name, topic, participants, flags)"
      input_schema:
        type: object
        properties:
          group_jid:
            type: string
            minLength: 1
            description: "Group JID (must end in `@g.us`)."
        required: [group_jid]

    # ── chats (read-side, cache-backed) ──
    - name: list_chats
      risk: read
      description: "List cached chats with optional search, type filter, sort, pagination, and last-message preview"
      input_schema:
        type: object
        properties:
          query:
            type: string
            description: "Case-insensitive substring on chat name or JID."
          limit:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
          page:
            type: integer
            minimum: 0
            default: 0
          include_last_message:
            type: boolean
            default: true
          sort_by:
            type: string
            enum: [last_active, name]
            default: last_active
          chat_type:
            type: string
            enum: [direct, group, newsletter, community]
            description: "Filter to a single chat type."
        required: []

    - name: get_chat
      risk: read
      scope_param: chat_jid
      description: "Fetch cached metadata for the chat at {chat_jid}, optionally including the last-message preview"
      input_schema:
        type: object
        properties:
          chat_jid:
            type: string
            minLength: 1
          include_last_message:
            type: boolean
            default: true
        required: [chat_jid]

    - name: list_messages
      risk: read
      description: "List cached messages with filters (chat, sender, FTS query, timestamp range) and pagination"
      input_schema:
        type: object
        properties:
          chat_jid:
            type: string
            description: "Restrict to a single chat."
          sender_jid:
            type: string
            description: "Restrict to a single sender."
          query:
            type: string
            description: "Full-text search across message bodies (FTS5; LIKE fallback server-side)."
          after:
            type: string
            description: "ISO-8601 timestamp; only messages strictly after this."
          before:
            type: string
            description: "ISO-8601 timestamp; only messages strictly before this."
          limit:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
          page:
            type: integer
            minimum: 0
            default: 0
        required: []

    - name: get_message_context
      risk: read
      scope_param: message_id
      description: "Fetch the messages immediately before and after {message_id} within its chat"
      input_schema:
        type: object
        properties:
          message_id:
            type: string
            minLength: 1
          before:
            type: integer
            minimum: 0
            maximum: 100
            default: 5
          after:
            type: integer
            minimum: 0
            maximum: 100
            default: 5
        required: [message_id]

    - name: get_direct_chat_by_contact
      risk: read
      scope_param: contact_jid
      description: "Resolve {contact_jid} (full JID or bare phone) to the corresponding 1:1 chat"
      input_schema:
        type: object
        properties:
          contact_jid:
            type: string
            minLength: 1
            description: "JID or bare phone number of the contact."
        required: [contact_jid]

    - name: get_contact_chats
      risk: read
      scope_param: contact_jid
      description: "List every cached chat (direct + groups) where {contact_jid} has sent a message or is the counterparty"
      input_schema:
        type: object
        properties:
          contact_jid:
            type: string
            minLength: 1
          limit:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
          page:
            type: integer
            minimum: 0
            default: 0
        required: [contact_jid]

    - name: get_last_interaction
      risk: read
      scope_param: contact_jid
      description: "Return the most recent cached message exchanged with {contact_jid} (1:1 or group)"
      input_schema:
        type: object
        properties:
          contact_jid:
            type: string
            minLength: 1
        required: [contact_jid]

    # ── cache diagnostics / control ──
    - name: cache_sync_status
      risk: read
      description: "Diagnostic snapshot of the local cache (chat/message/contact counts, last ingested event, sync run state)"
      input_schema:
        type: object
        properties: {}
        required: []

    - name: cache_sync
      risk: write
      description: "Trigger reconciliation of the local cache against authoritative whatsmeow endpoints; returns immediately with a `sync_id`"
      input_schema:
        type: object
        properties:
          force:
            type: boolean
            default: false
            description: "Reserved. Today no-op while a sync is running (the in-progress `sync_id` is returned regardless)."
        required: []
