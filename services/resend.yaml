key: resend
display_name: Resend
hosts:
  - api.resend.com
auth:
  - type: api_key
    default_secret_name: resend_key
    injection:
      as: header
      header_name: Authorization
      prefix: "Bearer "
actions:
  list_domains:
    method: GET
    path: /domains
    description: List verified sending domains
    risk: read
  send_email:
    method: POST
    path: /emails
    description: "Send email '{subject}' to {to}"
    risk: write
    params:
      from:
        type: string
        required: true
        description: Sender email address
      to:
        type: string
        required: true
        description: Recipient email address
      subject:
        type: string
        required: true
        description: Email subject line
      html:
        type: string
        description: HTML body content
