key: gmail
display_name: Gmail
description: Gmail API — send, read, search, and manage email messages and labels.
hosts:
  - gmail.googleapis.com
auth:
  - type: oauth
    provider: google
    token_injection:
      as: header
      header_name: Authorization
      prefix: "Bearer "
  - type: api_key
    default_secret_name: gmail_token
    injection:
      as: header
      header_name: Authorization
      prefix: "Bearer "
actions:
  get_profile:
    method: GET
    path: /gmail/v1/users/{userId}/profile
    description: "Get Gmail profile for {userId}"
    risk: read
    scope_param: userId
    params:
      userId:
        type: string
        required: true
        description: "User ID (use 'me' for the authenticated user)"
        default: me
        resolve:
          get: /gmail/v1/users/{userId}/profile
          pick: emailAddress
  list_labels:
    method: GET
    path: /gmail/v1/users/{userId}/labels
    description: "List Gmail labels for {userId}"
    risk: read
    scope_param: userId
    params:
      userId:
        type: string
        required: true
        description: "User ID (use 'me' for the authenticated user)"
        default: me
        resolve:
          get: /gmail/v1/users/{userId}/profile
          pick: emailAddress
  list_messages:
    method: GET
    path: /gmail/v1/users/{userId}/messages
    description: "Search messages for {userId}"
    risk: read
    scope_param: userId
    params:
      userId:
        type: string
        required: true
        description: "User ID (use 'me' for the authenticated user)"
        default: me
        resolve:
          get: /gmail/v1/users/{userId}/profile
          pick: emailAddress
      q:
        type: string
        description: "Search query (Gmail search syntax, e.g. 'from:user@example.com subject:hello')"
      labelIds:
        type: array
        description: Only return messages with labels matching all of the specified label IDs
      maxResults:
        type: integer
        description: Maximum number of messages to return (default 100, max 500)
      pageToken:
        type: string
        description: Page token from a previous list request
      includeSpamTrash:
        type: boolean
        description: Include messages from SPAM and TRASH in results
  get_message:
    method: GET
    path: /gmail/v1/users/{userId}/messages/{id}
    description: "Get message {id} for {userId}"
    risk: read
    scope_param: userId
    params:
      userId:
        type: string
        required: true
        description: "User ID (use 'me' for the authenticated user)"
        default: me
        resolve:
          get: /gmail/v1/users/{userId}/profile
          pick: emailAddress
      id:
        type: string
        required: true
        description: The ID of the message to retrieve
      format:
        type: string
        description: The format to return the message in
        enum: [full, metadata, minimal, raw]
      metadataHeaders:
        type: array
        description: "When format is 'metadata', only include these headers"
  send_message:
    method: POST
    path: /gmail/v1/users/{userId}/messages/send
    description: "Send email as {userId}"
    risk: write
    scope_param: userId
    params:
      userId:
        type: string
        required: true
        description: "User ID (use 'me' for the authenticated user)"
        default: me
        resolve:
          get: /gmail/v1/users/{userId}/profile
          pick: emailAddress
      raw:
        type: string
        required: true
        description: "Base64url-encoded RFC 2822 email message (headers + body)"
  trash_message:
    method: POST
    path: /gmail/v1/users/{userId}/messages/{id}/trash
    description: "Move message {id} to trash for {userId}"
    risk: delete
    scope_param: userId
    params:
      userId:
        type: string
        required: true
        description: "User ID (use 'me' for the authenticated user)"
        default: me
        resolve:
          get: /gmail/v1/users/{userId}/profile
          pick: emailAddress
      id:
        type: string
        required: true
        description: The ID of the message to move to trash
