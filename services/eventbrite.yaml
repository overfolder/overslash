key: eventbrite
display_name: Eventbrite
hosts:
  - www.eventbriteapi.com
auth:
  - type: oauth
    provider: eventbrite
    token_injection:
      as: header
      header_name: Authorization
      prefix: "Bearer "
  - type: api_key
    default_secret_name: eventbrite_token
    injection:
      as: header
      header_name: Authorization
      prefix: "Bearer "
actions:
  get_me:
    method: GET
    path: /v3/users/me/
    description: Get the authenticated user's profile
    risk: read
  search_events:
    method: GET
    path: /v3/events/search/
    description: Search for public events
    risk: read
    params:
      q:
        type: string
        description: Search query keywords
      location.address:
        type: string
        description: Address to search around
      location.latitude:
        type: string
        description: Latitude for location-based search
      location.longitude:
        type: string
        description: Longitude for location-based search
      location.within:
        type: string
        description: "Search radius with unit, e.g. '10km'"
      categories:
        type: string
        description: Comma-separated category IDs
      start_date.range_start:
        type: string
        description: "Start of date range (ISO 8601, e.g. 2026-01-01T00:00:00)"
      start_date.range_end:
        type: string
        description: "End of date range (ISO 8601)"
      page:
        type: integer
        description: Page number for pagination
  get_event:
    method: GET
    path: /v3/events/{event_id}/
    description: Get details of a specific event
    risk: read
    params:
      event_id:
        type: string
        required: true
        description: The event ID
  list_ticket_classes:
    method: GET
    path: /v3/events/{event_id}/ticket_classes/
    description: List available ticket types for an event
    risk: read
    params:
      event_id:
        type: string
        required: true
        description: The event ID
  list_event_attendees:
    method: GET
    path: /v3/events/{event_id}/attendees/
    description: List attendees for an event (requires organizer access)
    risk: read
    params:
      event_id:
        type: string
        required: true
        description: The event ID
      status:
        type: string
        description: "Filter by status: attending, not_attending, etc."
        enum: [attending, not_attending, unpaid]
  list_my_orders:
    method: GET
    path: /v3/users/me/orders/
    description: List orders placed by the authenticated user
    risk: read
  create_order:
    method: POST
    path: /v3/events/{event_id}/orders/
    description: Place an order (register) for an event
    risk: write
    params:
      event_id:
        type: string
        required: true
        description: The event ID to register for
  cancel_order:
    method: POST
    path: /v3/users/me/orders/{order_id}/cancel/
    description: Cancel an existing order
    risk: write
    params:
      order_id:
        type: string
        required: true
        description: The order ID to cancel
