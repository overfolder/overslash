openapi: 3.1.0
x-overslash-runtime: platform
info:
  title: Overslash Platform
  description: Administrative access to the Overslash platform
  key: overslash
  category: Platform
platform_actions:
  manage_members:
    description: "Manage org member roles and group assignments"
    risk: delete
  manage_groups:
    description: "Create, update, and delete groups and grants"
    risk: delete
  manage_secrets:
    description: "Create and update secrets"
    risk: write
  delete_secrets:
    description: "Delete secrets permanently"
    risk: delete
  manage_templates_own:
    description: "Author and manage service templates under your own scope"
    risk: write
  manage_templates_publish:
    description: "Publish service templates org-wide or globally (dashboard only)"
    risk: delete
  manage_webhooks:
    description: "Create, update, and delete webhooks"
    risk: delete
  manage_enrollment:
    description: "Create and manage enrollment tokens"
    risk: delete
  create_agents:
    description: "Create agent and sub-agent identities"
    risk: write
  create_users:
    description: "Create user identities"
    risk: delete
  manage_connections:
    description: "Create and delete OAuth connections"
    risk: write
  manage_byoc:
    description: "Manage bring-your-own-credential configurations"
    risk: delete
  resolve_approvals:
    description: "Resolve pending approval requests"
    risk: write
  manage_services:
    description: "Create service instances"
    risk: write
  delete_services:
    description: "Delete and manage service instance lifecycle"
    risk: delete
  manage_permissions:
    description: "Create and delete permission rules"
    risk: delete
  manage_api_keys:
    description: "Create API keys"
    risk: delete
  list_pending:
    description: >
      List approved actions with a pending execution, ready to dispatch or
      cancel. Scoped to the caller's own requests. Returns an array of approval
      objects; each includes a nested execution with status, expires_at, and
      result.
    risk: read
  call_pending:
    description: >
      Dispatch a previously-approved action. Requires params.approval_id
      (string). The execution must still be in pending state — it expires 15
      minutes after the approval was granted.
    risk: write
  cancel_pending:
    description: >
      Cancel a pending execution. Requires params.approval_id (string). The
      requesting agent or any resolver with write access may cancel.
    risk: write

  ping:
    description: "Ping the platform runtime (no-op health check)"
    risk: read

  list_templates:
    description: "List all service templates visible to the caller"
    risk: read
    permission: manage_templates_own

  get_template:
    description: "Get a service template by key"
    risk: read
    permission: manage_templates_own
    params:
      key: { type: string, required: true }

  create_template:
    description: "Create a new service template (atomic — succeeds or returns validation errors)"
    risk: write
    permission: manage_templates_own
    params:
      openapi: { type: string, required: true }
      user_level: { type: boolean, required: false }

  import_template:
    description: "Import an OpenAPI spec as a draft template (lenient — surfaces validation issues without rejecting)"
    risk: write
    permission: manage_templates_own
    params:
      openapi: { type: string, required: true }
      user_level: { type: boolean, required: false }
      include_operations: { type: array, required: false }
      key: { type: string, required: false }
      display_name: { type: string, required: false }
      draft_id: { type: string, required: false }

  delete_template:
    description: "Delete an active service template by key (user-tier or org-tier)"
    risk: delete
    permission: manage_templates_own
    params:
      key: { type: string, required: true }
