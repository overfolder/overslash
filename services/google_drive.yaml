openapi: 3.1.0
info:
  title: Google Drive
  description: Google Drive API — files, folders, permissions, and sharing.
  key: google_drive
  category: Storage
servers:
  - url: https://www.googleapis.com
components:
  securitySchemes:
    oauth:
      type: oauth2
      provider: google
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.google.com/o/oauth2/v2/auth
          tokenUrl: https://oauth2.googleapis.com/token
          scopes:
            https://www.googleapis.com/auth/drive: ""
paths:
  /drive/v3/about:
    get:
      operationId: get_about
      summary: Get information about the authenticated user and their Drive
      risk: read
      parameters:
        - name: fields
          in: query
          description: "Selector specifying which fields to return (e.g. 'user,storageQuota')"
          schema:
            type: string
            default: "user,storageQuota"
  /drive/v3/files:
    get:
      operationId: list_files
      summary: "List files in the user's Drive[ matching query {q}]"
      risk: read
      parameters:
        - name: q
          in: query
          description: "Query string for filtering results (e.g. \"mimeType='application/vnd.google-apps.folder'\")"
          schema:
            type: string
        - name: pageSize
          in: query
          description: Maximum number of files to return (1-1000, default 100)
          schema:
            type: integer
        - name: pageToken
          in: query
          description: Page token for continuing a previous list request
          schema:
            type: string
        - name: orderBy
          in: query
          description: "Comma-separated list of sort keys (e.g. 'modifiedTime desc,name')"
          schema:
            type: string
        - name: fields
          in: query
          description: "Selector specifying which fields to include in the response"
          schema:
            type: string
        - name: spaces
          in: query
          description: "Comma-separated list of spaces to query"
          schema:
            type: string
            enum: [drive, appDataFolder, photos]
        - name: corpora
          in: query
          description: "Bodies of items the query applies to"
          schema:
            type: string
            enum: [user, domain, drive, allDrives]
        - name: includeItemsFromAllDrives
          in: query
          description: Whether items from shared drives are included in results
          schema:
            type: boolean
        - name: supportsAllDrives
          in: query
          description: Whether the requesting application supports both My Drives and shared drives
          schema:
            type: boolean
    post:
      operationId: create_folder
      summary: "Create folder '{name}'"
      risk: write
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  description: Name of the folder to create
                mimeType:
                  type: string
                  description: MIME type for the new item
                  default: application/vnd.google-apps.folder
                parents:
                  type: array
                  description: "List of parent folder IDs (e.g. ['root'] or a specific folder id)"
                description:
                  type: string
                  description: Description of the folder
                supportsAllDrives:
                  type: boolean
                  description: Whether the requesting application supports both My Drives and shared drives
  /drive/v3/files/{fileId}:
    parameters:
      - name: fileId
        in: path
        required: true
        description: The ID of the file
        schema:
          type: string
        resolve:
          get: /drive/v3/files/{fileId}
          pick: name
    get:
      operationId: get_file
      summary: "Get metadata for file {fileId}"
      risk: read
      scope_param: fileId
      parameters:
        - name: fields
          in: query
          description: "Selector specifying which fields to return"
          schema:
            type: string
        - name: supportsAllDrives
          in: query
          description: Whether the requesting application supports both My Drives and shared drives
          schema:
            type: boolean
    patch:
      operationId: update_file_metadata
      summary: "Update metadata for file {fileId}[: rename to '{name}']"
      risk: write
      scope_param: fileId
      parameters:
        - name: supportsAllDrives
          in: query
          description: Whether the requesting application supports both My Drives and shared drives
          schema:
            type: boolean
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: New name for the file
                description:
                  type: string
                  description: New description for the file
                starred:
                  type: boolean
                  description: Whether the file is starred
                trashed:
                  type: boolean
                  description: Whether the file is in the trash
                mimeType:
                  type: string
                  description: New MIME type for the file
    delete:
      operationId: delete_file
      summary: "Permanently delete file {fileId}"
      risk: delete
      scope_param: fileId
      parameters:
        - name: supportsAllDrives
          in: query
          description: Whether the requesting application supports both My Drives and shared drives
          schema:
            type: boolean
  /drive/v3/files/{fileId}/export:
    get:
      operationId: get_file_content
      summary: "Download the binary content of file {fileId}"
      risk: read
      scope_param: fileId
      responses:
        "200":
          content:
            application/octet-stream: {}
      parameters:
        - name: fileId
          in: path
          required: true
          description: The ID of the file to download
          schema:
            type: string
          resolve:
            get: /drive/v3/files/{fileId}
            pick: name
        - name: alt
          in: query
          description: Must be 'media' to return file content
          schema:
            type: string
            default: media
        - name: supportsAllDrives
          in: query
          description: Whether the requesting application supports both My Drives and shared drives
          schema:
            type: boolean
  /drive/v3/files/{fileId}/copy:
    post:
      operationId: copy_file
      summary: "Copy file {fileId}[ as '{name}']"
      risk: write
      scope_param: fileId
      parameters:
        - name: fileId
          in: path
          required: true
          description: The ID of the file to copy
          schema:
            type: string
          resolve:
            get: /drive/v3/files/{fileId}
            pick: name
        - name: supportsAllDrives
          in: query
          description: Whether the requesting application supports both My Drives and shared drives
          schema:
            type: boolean
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Name for the new copy
                parents:
                  type: array
                  description: List of parent folder IDs for the new copy
  /drive/v3/files/{fileId}/permissions:
    parameters:
      - name: fileId
        in: path
        required: true
        description: The ID of the file
        schema:
          type: string
        resolve:
          get: /drive/v3/files/{fileId}
          pick: name
    get:
      operationId: list_permissions
      summary: "List permissions on file {fileId}"
      risk: read
      scope_param: fileId
      parameters:
        - name: pageSize
          in: query
          description: Maximum number of permissions to return
          schema:
            type: integer
        - name: pageToken
          in: query
          description: Page token for continuing a previous list request
          schema:
            type: string
        - name: fields
          in: query
          description: Selector specifying which fields to return
          schema:
            type: string
        - name: supportsAllDrives
          in: query
          description: Whether the requesting application supports both My Drives and shared drives
          schema:
            type: boolean
    post:
      operationId: create_permission
      summary: "Grant {role} permission on file {fileId}[ to {emailAddress}]"
      risk: write
      scope_param: fileId
      parameters:
        - name: supportsAllDrives
          in: query
          description: Whether the requesting application supports both My Drives and shared drives
          schema:
            type: boolean
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role, type]
              properties:
                role:
                  type: string
                  description: The role granted by this permission
                  enum: [reader, commenter, writer, fileOrganizer, organizer, owner]
                type:
                  type: string
                  description: The type of grantee
                  enum: [user, group, domain, anyone]
                emailAddress:
                  type: string
                  description: Email address of the user or group
                domain:
                  type: string
                  description: Domain name (required when type is 'domain')
                sendNotificationEmail:
                  type: boolean
                  description: Whether to send a notification email when sharing
                transferOwnership:
                  type: boolean
                  description: Whether to transfer ownership to the specified user
  /drive/v3/files/{fileId}/permissions/{permissionId}:
    delete:
      operationId: delete_permission
      summary: "Revoke permission {permissionId} from file {fileId}"
      risk: delete
      scope_param: fileId
      parameters:
        - name: fileId
          in: path
          required: true
          description: The ID of the file
          schema:
            type: string
          resolve:
            get: /drive/v3/files/{fileId}
            pick: name
        - name: permissionId
          in: path
          required: true
          description: The ID of the permission to revoke
          schema:
            type: string
        - name: supportsAllDrives
          in: query
          description: Whether the requesting application supports both My Drives and shared drives
          schema:
            type: boolean
